version: "3.8"

services:
  bpmn-evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bpmn-evaluator
    ports:
      - "8000:8000"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
